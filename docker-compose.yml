services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: carmarch
      POSTGRES_PASSWORD: carmarch
      POSTGRES_DB: carmarch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carmarch -d carmarch"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://carmarch:carmarch@db:5432/carmarch
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
